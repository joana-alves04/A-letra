<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Expressão: Estar com a pulga atrás da orelha</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Baloo+2:wght@400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        :root {
            --font-serif: "Averia Serif Libre", Georgia, serif;
            --font-sans: "Baloo 2", system-ui, sans-serif;
            --text-color: #111;
            --bg-dynamic: rgb(244, 235, 216);
        }

        body, html {
            margin: 0; padding: 0;
            background: #f0f0f0;
            font-family: var(--font-serif);
            overflow: hidden;
            width: 100vw; height: 100vh;
            position: relative;
        }

        .window {
            position: absolute;
            width: 200px;
            background: white;
            border: 1px solid #000;
            padding: 8px;
            cursor: grab;
            box-shadow: 5px 5px 0px #000;
            user-select: none;
            touch-action: none;
        }

        .window.dragging {
            cursor: grabbing;
            box-shadow: 14px 14px 0px #000;
            transition: box-shadow 0.15s ease;
        }

        .window.releasing {
            transition: left 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        top 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        box-shadow 0.2s ease;
        }

        .window img.main-img {
            width: 100%;
            height: 150px;
            display: block;
            background: #ddd;
            pointer-events: none;
            box-sizing: border-box;
            object-fit: contain;
            padding: 20px;
        }

        .window-num {
            text-align: center;
            padding: 6px 0 3px 0;
            font-size: 0.85rem;
            font-style: italic;
            font-family: var(--font-serif);
        }

        .letters-behind {
            position: absolute;
            font-size: 1rem;
            letter-spacing: 4px;
            color: #555;
            pointer-events: none;
            z-index: 0;
            font-family: var(--font-serif);
        }

        .letters-below {
            text-align: center;
            font-size: 1rem;
            letter-spacing: 4px;
            color: #555;
            padding-top: 6px;
            display: none;
            font-family: var(--font-serif);
        }

        #flea {
            position: fixed;
            width: 36px;
            height: 36px;
            display: none;
            z-index: 9999;
            pointer-events: none;
        }

        #flea img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        @media (max-width: 768px) {
            .window {
                width: 140px;
                max-width: 28vw;
                padding: 6px;
                box-shadow: 3px 3px 0px #000;
            }
            .window.dragging {
                box-shadow: 8px 8px 0px #000;
            }
            .window img.main-img {
                height: 18vw;
                min-height: 65px;
                padding: 6px;
            }
            .window-num {
                padding: 4px 0 2px 0;
                font-size: 0.8rem;
            }
            .letters-behind, .letters-below {
                font-size: 0.85rem;
                letter-spacing: 2px;
            }
            #flea {
                width: 22px;
                height: 22px;
            }
        }
    </style>
</head>
<body>

    <div class="window" id="win1" data-order="3" style="top: 10vh; left: 5vw; z-index:5;">
        <img class="main-img" src="../imgs/orelha_coelho.png" alt="">
        <div class="window-num">3</div>
        <div class="letters-below">tx</div>
    </div>

    <div class="window" id="win2" data-order="1" style="top: 55vh; left: 10vw; z-index:5;">
        <img class="main-img" src="../imgs/orelha_burro.png" alt="">
        <div class="window-num">1</div>
        <div class="letters-below">pulga</div>
    </div>

    <div class="window" id="win3" data-order="5" style="top: 8vh; left: 50vw; z-index:5;">
        <img class="main-img" src="../imgs/orelha_gato.png" alt="">
        <div class="window-num">5</div>
        <div class="letters-below">.html</div>
    </div>

    <div class="window" id="win4" data-order="2" style="top: 52vh; left: 52vw; z-index:5;">
        <img class="main-img" src="../imgs/orelha_humano.png" alt="">
        <div class="window-num">2</div>
        <div class="letters-below">wf</div>
    </div>

    <div class="window" id="win5" data-order="4" style="top: 30vh; left: 30vw; z-index:5;">
        <img class="main-img" src="../imgs/orelha_cao.png" alt="">
        <div class="window-num">4</div>
        <div class="letters-below">pd</div>
    </div>

    <div id="flea"><img src="../imgs/pulga1.png" alt=""></div>

    <script>
        const windows = Array.from(document.querySelectorAll('.window'));
        const fleaEl = document.getElementById('flea');
        let selectedWin = null;
        let offsetX = 0, offsetY = 0;
        let fleaActive = false;
        let lastX = 0, lastY = 0;
        let velX = 0, velY = 0;

        const windowsByOrder = [...windows].sort((a, b) =>
            parseInt(a.dataset.order) - parseInt(b.dataset.order)
        );

        const lettersData = { win1: 'tx', win2: 'pulga', win3: '.html', win4: 'wf', win5: 'pd' };
        const behindEls = new Map();
        const revealed = new Map();

        function initLetters() {
            windows.forEach(win => {
                if (!revealed.get(win)) {
                    let behind = behindEls.get(win);
                    if (!behind) {
                        behind = document.createElement('div');
                        behind.className = 'letters-behind';
                        behind.textContent = lettersData[win.id];
                        document.body.appendChild(behind);
                        behindEls.set(win, behind);
                    }
                    const rect = win.getBoundingClientRect();
                    behind.style.left = (rect.left + rect.width / 2) + 'px';
                    behind.style.top = (rect.bottom - 30) + 'px';
                    behind.style.transform = 'translateX(-50%)';
                }
            });
        }

        window.addEventListener('load', () => {
            revealed.clear();
            windows.forEach(win => revealed.set(win, false));
            initLetters();
        });
        window.addEventListener('resize', initLetters);

        function getWinCorner(win) {
            const r = win.getBoundingClientRect();
            return { x: r.right - 10, y: r.top - 10 };
        }

        function getNextInSequence(currentWin) {
            const currentOrder = parseInt(currentWin.dataset.order);
            const maxOrder = windowsByOrder.length;
            const nextOrder = (currentOrder % maxOrder) + 1;
            return windowsByOrder.find(w => parseInt(w.dataset.order) === nextOrder);
        }

        function jumpFlea(fromCorner, toWin) {
            const startX = fromCorner.x - 18;
            const startY = fromCorner.y - 18;
            const toCorner = getWinCorner(toWin);
            const endX = toCorner.x - 18;
            const endY = toCorner.y - 18;
            const midX = (startX + endX) / 2;
            const midY = Math.min(startY, endY) - 200;
            const duration = 800;
            const startTime = performance.now();
            fleaEl.style.display = 'block';

            function step(now) {
                const t = Math.min((now - startTime) / duration, 1);
                const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                const x = (1 - ease) * (1 - ease) * startX + 2 * (1 - ease) * ease * midX + ease * ease * endX;
                const y = (1 - ease) * (1 - ease) * startY + 2 * (1 - ease) * ease * midY + ease * ease * endY;
                fleaEl.style.left = x + 'px';
                fleaEl.style.top = y + 'px';
                if (t < 1) {
                    requestAnimationFrame(step);
                } else {
                    fleaEl.style.display = 'none';
                    fleaActive = false;
                }
            }
            requestAnimationFrame(step);
        }

        function triggerFlea(startWin) {
            if (fleaActive) return;
            fleaActive = true;
            const corner = getWinCorner(startWin);
            fleaEl.style.left = (corner.x - 18) + 'px';
            fleaEl.style.top = (corner.y - 18) + 'px';
            fleaEl.style.display = 'block';
            setTimeout(() => {
                const next = getNextInSequence(startWin);
                jumpFlea(corner, next);
            }, 100);
        }

        function checkExposed(movedWin) {
            if (revealed.get(movedWin)) return;

            const behind = behindEls.get(movedWin);
            if (!behind || behind.style.display === 'none') return;

            const r = behind.getBoundingClientRect();
            const cx = r.left + r.width / 2;
            const cy = r.top + r.height / 2;

            const covered = windows.some(w => {
                if (w === movedWin) return false;
                const wr = w.getBoundingClientRect();
                return cx >= wr.left && cx <= wr.right && cy >= wr.top && cy <= wr.bottom;
            });

            if (!covered) {
                revealed.set(movedWin, true);
                setTimeout(() => {
                    behind.style.display = 'none';
                    movedWin.querySelector('.letters-below').style.display = 'block';
                }, 500);
                triggerFlea(movedWin);
            }
        }

        function clamp(val, min, max) {
            return Math.max(min, Math.min(max, val));
        }

        function startDrag(e, clientX, clientY) {
            const win = e.target.closest('.window');
            if (!win) return;

            win.classList.remove('releasing');
            win.classList.add('dragging');

            selectedWin = win;
            const rect = win.getBoundingClientRect();
            offsetX = clientX - rect.left;
            offsetY = clientY - rect.top;
            lastX = clientX;
            lastY = clientY;
            velX = 0;
            velY = 0;
            win.style.zIndex = 1000;

            checkExposed(win);
        }

        function moveDrag(clientX, clientY) {
            if (!selectedWin) return;

            velX = clientX - lastX;
            velY = clientY - lastY;
            lastX = clientX;
            lastY = clientY;

            const newLeft = clamp(clientX - offsetX, 0, window.innerWidth - selectedWin.offsetWidth);
            const newTop = clamp(clientY - offsetY, 0, window.innerHeight - selectedWin.offsetHeight);

            selectedWin.style.left = newLeft + 'px';
            selectedWin.style.top = newTop + 'px';
        }

        function endDrag() {
            if (!selectedWin) return;

            const win = selectedWin;
            selectedWin = null;

            win.classList.remove('dragging');

            let currentLeft = parseFloat(win.style.left);
            let currentTop = parseFloat(win.style.top);
            let vx = velX * 3;
            let vy = velY * 3;

            function updateBehind(w) {
                const behind = behindEls.get(w);
                if (behind && !revealed.get(w)) {
                    const rect = w.getBoundingClientRect();
                    behind.style.left = (rect.left + rect.width / 2) + 'px';
                    behind.style.top = (rect.bottom - 30) + 'px';
                }
            }

            function settle() {
                vx *= 0.85;
                vy *= 0.85;
                currentLeft = clamp(currentLeft + vx, 0, window.innerWidth - win.offsetWidth);
                currentTop = clamp(currentTop + vy, 0, window.innerHeight - win.offsetHeight);
                win.style.left = currentLeft + 'px';
                win.style.top = currentTop + 'px';
                updateBehind(win);

                if (Math.abs(vx) > 0.4 || Math.abs(vy) > 0.4) {
                    requestAnimationFrame(settle);
                } else {
                    win.style.zIndex = 5;
                }
            }

            requestAnimationFrame(settle);
        }

        document.addEventListener('mousedown', (e) => startDrag(e, e.clientX, e.clientY));
        document.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY));
        document.addEventListener('mouseup', endDrag);

        document.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) startDrag(e, e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
        document.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1) {
                e.preventDefault();
                moveDrag(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });
        document.addEventListener('touchend', endDrag);
    </script>
</body>
</html>
