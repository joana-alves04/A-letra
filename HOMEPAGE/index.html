<!doctype html>
<html lang="pt">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HOMEPAGE</title>
  <meta name="description" content="Uma escolha entre dez possibilidades. Estúdio de design e ideias." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles_home.css" />
</head>

<body>

  <main>
    <!-- HERO -->
    <section class="hero">
      <img src="logo.png" alt="Aletra" class="hero-logo reveal" />
      <div class="scroll-hint">
        <span>scroll</span>
        <span>↓</span>
      </div>
    </section>
    <section class="slide">
      <p class="slide-text">E se tudo o que dissesses,<br>acontecesse?</p>
    </section>

    <section class="slide">
      <p class="slide-text">Num mundo onde a<br>linguagem deixa de ser<br>figurativa…</p>
    </section>

    <section class="slide">
      <p>meter algo aqui</p>
    </section>

    <section class="slide">
      <p class="slide-text">As palavras já não são <br>só palavras.</p>
    </section>

    <!-- ÍNDICE -->
    <section class="index" id="indice">
      <div class="list">
        <!-- linhas geradas via JS -->
      </div>
      <div class="row-divider"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>

</html>
