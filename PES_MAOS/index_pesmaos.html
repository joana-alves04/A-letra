<!DOCTYPE html>
<html lang="pt">

<head>

    <title>Expressão: Meter os pés pelas mãos</title>
    <link rel="stylesheet" href="style_pesmaos.css?v=8">
</head>

<body>

    <div id="camera">

            <button class="trilha pe" style="left: 110vw; top: 80vh; --rot: 80deg;"><img src="../imgs/pegada.png"

            <button class="trilha mao" style="left: 190vw; top: 130vh; --rot: -15deg;"><img src="../imgs/maos.png"

            <button class="trilha pe" style="left: 200vw; top: 145vh; --rot: 5deg;"><img src="../imgs/pegada.png"

            <button class="trilha pe" style="left: 220vw; top: 150vh; --rot: 0deg;"><img src="../imgs/pegada.png"

            <div class="screen" id="screen-1">
                <p class="reveal-text is-visible">Clica nas pegadas para avançar.<br><span
                        style="font-size: 0.6em; color: var(--accent);">Mas tem cuidado onde tocas...</span></p>
            </div>

            <div class="screen" id="screen-2">
                <p class="reveal-text">A pressa aumentou e as direções baralharam-se!</p>
            </div>

            <div class="screen" id="screen-3">
                <p class="reveal-text">A esquerda virou direita.<br>O caos instalou-se no cérebro!</p>
            </div>

            <div class="screen" id="screen-4">
                <div class="caos-container">
                    <p class="pre-title">E acabámos a...</p>
                    <h1 class="title-expressao">"METER OS PÉS<br>PELAS MÃOS!"</h1>

                    <div class="end-buttons">
                        <a href="sobre_pesmaos.html" class="final-btn btn-top">Saber mais sobre a expressão</a>
                        <a href="../index.html" class="final-btn btn-bottom">Página Inicial</a>
