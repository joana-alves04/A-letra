<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expressão: Meter os pés pelas mãos</title>
    <link rel="stylesheet" href="style_pesmaos.css">
</head>

<body>

    <div id="scroll-track">

        <div id="camera">

            <div id="canvas-gigante">

                <span class="trilha pe" style="left: 30vw; top: 50vh;"><img src="../imgs/pegada.png"
                        alt="Pegada"></span>
                <span class="trilha pe" style="left: 60vw; top: 50vh;"><img src="../imgs/pegada.png"
                        alt="Pegada"></span>

                <span class="trilha pe" style="left: 150vw; top: 20vh; transform: rotate(90deg);"><img
                        src="../imgs/pegada.png" alt="Pegada"></span>
                <span class="trilha mao" style="left: 150vw; top: 50vh; transform: rotate(140deg);">🖐️</span>
                <span class="trilha pe" style="left: 150vw; top: 80vh; transform: rotate(-45deg);"><img
                        src="../imgs/pegada.png" alt="Pegada"></span>

                <span class="trilha mao" style="left: 120vw; top: 150vh; transform: rotate(180deg);">🤚</span>
                <span class="trilha pe" style="left: 160vw; top: 120vh; transform: rotate(30deg);"><img
                        src="../imgs/pegada.png" alt="Pegada"></span>

                <div class="screen" id="screen-1">
                    <p class="reveal-text is-visible">Tudo começou num caminho claro e em frente...</p>
                    <div class="dica-scroll">Faz scroll para avançar</div>
                </div>

                <div class="screen" id="screen-2">
                    <p class="reveal-text">Mas a pressa aumentou e as direções baralharam-se!</p>
                </div>

                <div class="screen" id="screen-3">
                    <p class="reveal-text">A esquerda virou direita.<br>O caos instalou-se no cérebro!</p>
                </div>

                <div class="screen" id="screen-4">
                    <p class="pre-title">E acabámos a...</p>
                    <h1 class="title-expressao">"METER OS PÉS<br>PELAS MÃOS!"</h1>

                    <div class="end-buttons">
                        <a href="sobre_pesmaos.html" class="final-btn btn-top">Saber mais sobre a expressão</a>
                        <a href="../index.html" class="final-btn btn-bottom">Página Inicial</a>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
